<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Persönlichkeitsgenerator</title>

	<!-- Typography: DM Sans & DM Mono -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
		rel="stylesheet" />

	<!-- Design System Styles -->
	<link rel="stylesheet" href="styles/custom.css" />

	<!-- 
	THEME SYSTEM (CSS-ONLY):
	- Light mode: Default (:root tokens)
	- Dark mode: Set via [data-theme="dark"] attribute on <html> element
	- System preference: Automatically applied via @media (prefers-color-scheme: dark)
	  when html element does NOT have [data-theme="light"] attribute
	
	Example manual override:
	- Add to <html> element: <html data-theme="dark"> or <html data-theme="light">
	- Or let CSS @media query handle system preference automatically
	
	No JavaScript theme switching — pure CSS-based only.
	-->
</head>

<body>

	<nav class="guide-nav">
		<div class="guide-nav-logo"></div>
		<h3>Persönlichkeitsgenerator</h3>

		</div>
		<!-- <h1 style="margin-bottom: var(--space-4);">Persönlichkeitsgenerator</h1> -->
		<button class="theme-toggle" id="themeToggle" aria-label="Theme wechseln" title="Light / Dark Mode">
			<!-- Sun icon (shown in dark mode) -->
			<svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
				stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<circle cx="12" cy="12" r="4" />
				<line x1="12" y1="2" x2="12" y2="6" />
				<line x1="12" y1="18" x2="12" y2="22" />
				<line x1="4.22" y1="4.22" x2="7.05" y2="7.05" />
				<line x1="16.95" y1="16.95" x2="19.78" y2="19.78" />
				<line x1="2" y1="12" x2="6" y2="12" />
				<line x1="18" y1="12" x2="22" y2="12" />
				<line x1="4.22" y1="19.78" x2="7.05" y2="16.95" />
				<line x1="16.95" y1="7.05" x2="19.78" y2="4.22" />
			</svg>
			<!-- Moon icon (shown in light mode) -->
			<svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
				stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
			</svg>
		</button>
	</nav>
	<div class="container">
		<!-- Header Section -->
		<section class="section">



			<div class="form-group">
				<label for="dropdown-archetype" class="form-label">Archetyp</label>
				<select class="form-select" id="dropdown-archetype" name="archetype">
					<option id="none">Keiner</option>
					<option selected id="random">Zufall</option>
					<option id="idealist">Idealist</option>
					<option id="realist">Realist</option>
					<option id="caregiver">Fürsorger</option>
					<option id="warrior">Krieger</option>
					<option id="seeker">Suchender</option>
					<option id="lover">Liebhaber</option>
					<option id="creator">Schöpfer</option>
					<option id="revolutionary">Revolutionär</option>
					<option id="sage">Weiser</option>
					<option id="magician">Magier</option>
					<option id="ruler">Herrscher</option>
					<option id="jester">Narr</option>
				</select>
			</div>
		</section>

		<!-- Configuration Grid -->
		<section class="section">
			<div class="grid">
				<!-- Archetype Display Options -->
				<div class="col-12 col-md-4">
					<fieldset class="form-group">
						<legend class="form-label">Was soll von Archetypen angezeigt werden?</legend>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showArchetype" checked />
							<label class="form-check-label" for="showArchetype">Archetyp</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showArchetypeAliases"
								checked />
							<label class="form-check-label" for="showArchetypeAliases">Alias</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showArchetypeDescription"
								checked />
							<label class="form-check-label" for="showArchetypeDescription">Beschreibung</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox"
								id="showArchetypeCoreIdentity" checked />
							<label class="form-check-label" for="showArchetypeCoreIdentity">Kernidentität</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showArchetypePerception"
								checked />
							<label class="form-check-label" for="showArchetypePerception">Wahrnehmung</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showArchetypeLifePlot"
								checked />
							<label class="form-check-label" for="showArchetypeLifePlot">Lebensmuster</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox"
								id="showArchetypeFulfillingActivities" checked />
							<label class="form-check-label" for="showArchetypeFulfillingActivities">Erfüllende
								Tätigkeiten</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox"
								id="showArchetypeHappinessSource" checked />
							<label class="form-check-label" for="showArchetypeHappinessSource">Glücksquellen</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox"
								id="showArchetypeLeadershipStyle" checked />
							<label class="form-check-label" for="showArchetypeLeadershipStyle">Führungsstil</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox"
								id="showArchetypeHowOthersSeeThem" checked />
							<label class="form-check-label" for="showArchetypeHowOthersSeeThem">Fremdwahrnehmung</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox"
								id="showArchetypeShadowTendencies" checked />
							<label class="form-check-label" for="showArchetypeShadowTendencies">Schattenseiten</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox"
								id="showArchetypeUnderlyingFear" checked />
							<label class="form-check-label" for="showArchetypeUnderlyingFear">Tiefe Ängste</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showArchetypeGrowthAreas"
								checked />
							<label class="form-check-label" for="showArchetypeGrowthAreas">Wachstumsfelder</label>
						</div>
					</fieldset>
				</div>

				<!-- HEXACO Display Options -->
				<div class="col-12 col-md-4">
					<fieldset class="form-group">
						<legend class="form-label">Was soll von HEXACO angezeigt werden?</legend>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showDegrees" checked />
							<label class="form-check-label" for="showDegrees">Steigerungspartikel</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showAdjectives"
								checked />
							<label class="form-check-label" for="showAdjectives">Adjektive</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showDescriptions"
								checked />
							<label class="form-check-label" for="showDescriptions">Beschreibungen</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showItems" checked />
							<label class="form-check-label" for="showItems">Items</label>
						</div>
					</fieldset>
				</div>

				<!-- Values Display Options -->
				<div class="col-12 col-md-4">
					<fieldset class="form-group">
						<legend class="form-label">Was soll von Werten angezeigt werden?</legend>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showStrongPositive"
								checked />
							<label class="form-check-label" for="showStrongPositive">Stark positive Werte</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showModeratePositive"
								checked />
							<label class="form-check-label" for="showModeratePositive">Eher positive Werte</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showNeutral" checked />
							<label class="form-check-label" for="showNeutral">Neutrale Werte</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showModerateNegative"
								checked />
							<label class="form-check-label" for="showModerateNegative">Eher negative Werte</label>
						</div>
						<div class="form-check">
							<input class="form-check-input display-option" type="checkbox" id="showStrongNegative"
								checked />
							<label class="form-check-label" for="showStrongNegative">Stark negative Werte</label>
						</div>
					</fieldset>
				</div>
			</div>

			<!-- Generate Button -->
			<div class="mt-6">
				<button id="btn-generate-personality" class="btn btn-primary">
					Generieren
				</button>
			</div>
		</section>

		<!-- Output Section -->
		<section class="section">
			<h2>Persönlichkeitsmerkmale</h2>
			<div id="output"></div>
		</section>
	</div>

	<!-- Scripts -->
	<script src="scripts/archetypeArray.js"></script>
	<script src="scripts/facetArray.js"></script>
	<script src="scripts/main.js"></script>
	<script src="scripts/chooseArchetype.js"></script>
	<script src="scripts/setDomainLevel.js"></script>
	<script src="scripts/getArchetypeInfo.js"></script>
	<script src="scripts/setFacetLevel.js"></script>
	<script src="scripts/getFacetDescription.js"></script>
	<script src="scripts/getFacetAdjective.js"></script>
	<script src="scripts/getFacetItem.js"></script>
	<script src="scripts/getFacetDegree.js"></script>
	<script src="scripts/getMoralValueInfo.js"></script>
	<script src="scripts/valueArchetypesText.js"></script>
	<script src="scripts/valueArchetypes.js"></script>
	<script src="scripts/singleValueText.js"></script>
	<script src="scripts/singleValueCombination.js"></script>
	<script src="scripts/computeValueProfile.js"></script>
</body>

</html>
