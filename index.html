<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8" />
	<title>Persönlichkeitsgenerator</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		crossorigin="anonymous"></script>
	<link rel="stylesheet" href="styles/custom.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
	<div class="container-fluid">
		<div class="mb-3">
			<div class="row">
				<div class="col">
					<h1><b>Persönlichkeitsgenerator</b></h1>
					<p><b>Archetyp:</b></p>
					<select class="form-select mb-4" style="width:auto" id="dropdown-archetype" name="archetype">
						<option id="none">Keiner</option>
						<option selected id="random">Zufall</option>
						<option id="idealist">Idealist</option>
						<option id="realist">Realist</option>
						<option id="caregiver">Fürsorger</option>
						<option id="warrior">Krieger</option>
						<option id="seeker">Suchender</option>
						<option id="lover">Liebhaber</option>
						<option id="creator">Schöpfer</option>
						<option id="revolutionary">Revolutionär</option>
						<option id="sage">Weiser</option>
						<option id="magician">Magier</option>
						<option id="ruler">Herrscher</option>
						<option id="jester">Narr</option>
					</select>
				</div>
			</div>
		</div>
		<div class="row mb-4">
			<div class="col-md-4 col-sm-12">
				<label class="form-label"><b>Was soll von Archetypen angezeigt werden?</b></label>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetype" checked>
					<label class="form-check-label" for="showArchetype">Archetyp</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeAliases" checked>
					<label class="form-check-label" for="showArchetype">Alias</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeDescription"
						checked>
					<label class="form-check-label" for="showArchetype">Beschreibung</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeCoreIdentity"
						checked>
					<label class="form-check-label" for="showArchetype">Kernidentität</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypePerception" checked>
					<label class="form-check-label" for="showArchetype">Wahrnehmung</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeLifePlot" checked>
					<label class="form-check-label" for="showArchetype">Lebensmuster</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox"
						id="showArchetypeFulfillingActivities" checked>
					<label class="form-check-label" for="showArchetype">Erfüllende Tätigkeiten</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeHappinessSource"
						checked>
					<label class="form-check-label" for="showArchetype">Glücksquellen</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeLeadershipStyle"
						checked>
					<label class="form-check-label" for="showArchetype">Führungsstil</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeHowOthersSeeThem"
						checked>
					<label class="form-check-label" for="showArchetype">Fremdwahrnehmung</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeShadowTendencies"
						checked>
					<label class="form-check-label" for="showArchetype">Schattenseiten</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeUnderlyingFear"
						checked>
					<label class="form-check-label" for="showArchetype">Tiefe Ängste</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showArchetypeGrowthAreas"
						checked>
					<label class="form-check-label" for="showArchetype">Wachstumsfelder</label>
				</div>
			</div>
			<br>
			<div class="col-md-4 col-sm-12">
				<label class="form-label"><b>Was soll von HEXACO angezeigt werden?</b></label>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showDegrees" checked>
					<label class="form-check-label" for="showDegrees">Steigerungspartikel</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showAdjectives" checked>
					<label class="form-check-label" for="showAdjectives">Adjektive</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showDescriptions" checked>
					<label class="form-check-label" for="showDescriptions">Beschreibungen</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showItems" checked>
					<label class="form-check-label" for="showItems">Items</label>
				</div>
			</div>
			<br>
			<div class="col-md-4 col-sm-12">
				<label class="form-label"><b>Was soll von Werten angezeigt werden?</b></label>
				<!-- <div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showWertArchetyp" checked>
					<label class="form-check-label" for="showWertArchetyp">Werte-Archetyp</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showWertKombination" checked>
					<label class="form-check-label" for="showWertKombination">Werte-Kombination</label>
				</div> -->
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showStrongPositive" checked>
					<label class="form-check-label" for="showStrongPositive">Stark positive Werte</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showModeratePositive" checked>
					<label class="form-check-label" for="showModeratePositive">Eher positive Werte</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showNeutral" checked>
					<label class="form-check-label" for="showNeutral">Neutrale Werte</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showModerateNegative" checked>
					<label class="form-check-label" for="showModerateNegative">Eher negative Werte</label>
				</div>
				<div class="form-check">
					<input class="form-check-input display-option" type="checkbox" id="showStrongNegative" checked>
					<label class="form-check-label" for="showStrongNegative">Stark negative Werte</label>
				</div>
			</div>
		</div>
		<button id="btn-generate-personality" class="btn btn-secondary mb-4">
			Generieren
		</button>
		<h2>Persönlichkeitsmerkmale</h2>
		<div class="container-fluid" id="output"></div>
	</div>

	</div>
	<script src="scripts/archetypeArray.js"></script>
	<script src="scripts/facetArray.js"></script>
	<script src="scripts/main.js"></script>
	<script src="scripts/chooseArchetype.js"></script>

	<script src="scripts/setDomainLevel.js"></script>
	<script src="scripts/getArchetypeInfo.js"></script>
	<script src="scripts/setFacetLevel.js"></script>
	<script src="scripts/getFacetDescription.js"></script>
	<script src="scripts/getFacetAdjective.js"></script>
	<script src="scripts/getFacetItem.js"></script>
	<script src="scripts/getFacetDegree.js"></script>
	<script src="scripts/getMoralValueInfo.js"></script>
	<script src="scripts/valueArchetypesText.js"></script>
	<script src="scripts/valueArchetypes.js"></script>
	<script src="scripts/singleValueText.js"></script>
	<script src="scripts/singleValueCombination.js"></script>
	<script src="scripts/computeValueProfile.js"></script>

</body>

</html>
