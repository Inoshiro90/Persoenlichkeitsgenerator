<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Persönlichkeitsgenerator</title>

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="styles/custom.css" />
</head>

<body>

	<nav class="guide-nav">
		<div class="guide-nav-logo"></div>
		<h3>Persönlichkeitsgenerator</h3>
		<button class="theme-toggle" id="themeToggle" aria-label="Theme wechseln" title="Light / Dark Mode">
			<svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<circle cx="12" cy="12" r="4" />
				<line x1="12" y1="2" x2="12" y2="6" /><line x1="12" y1="18" x2="12" y2="22" />
				<line x1="4.22" y1="4.22" x2="7.05" y2="7.05" /><line x1="16.95" y1="16.95" x2="19.78" y2="19.78" />
				<line x1="2" y1="12" x2="6" y2="12" /><line x1="18" y1="12" x2="22" y2="12" />
				<line x1="4.22" y1="19.78" x2="7.05" y2="16.95" /><line x1="16.95" y1="7.05" x2="19.78" y2="4.22" />
			</svg>
			<svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
			</svg>
		</button>
	</nav>

	<div class="container">
		<!-- Archetyp-Auswahl -->
		<section class="section">
			<div class="form-group">
				<label for="dropdown-archetype" class="form-label">Archetyp</label>
				<select class="form-select" id="dropdown-archetype" name="archetype">
					<option id="none">Keiner</option>
					<option selected id="random">Zufall</option>
					<option id="idealist">Idealist</option>
					<option id="realist">Realist</option>
					<option id="caregiver">Fürsorger</option>
					<option id="warrior">Krieger</option>
					<option id="seeker">Suchender</option>
					<option id="lover">Liebender</option>
					<option id="creator">Schöpfer</option>
					<option id="revolutionary">Revolutionär</option>
					<option id="sage">Weiser</option>
					<option id="magician">Magier</option>
					<option id="ruler">Herrscher</option>
					<option id="jester">Narr</option>
				</select>
			</div>
		</section>

		<!-- Konfigurationsraster -->
		<section class="section">
			<div class="grid">

				<!-- Archetyp-Anzeigeoptionen -->
				<div class="col-12 col-md-4">
					<fieldset class="form-group">
						<legend class="form-label">Archetyp</legend>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetype" checked /><label class="form-check-label" for="showArchetype">Name</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeAliases" checked /><label class="form-check-label" for="showArchetypeAliases">Alias</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeDescription" checked /><label class="form-check-label" for="showArchetypeDescription">Beschreibung</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeCoreIdentity" checked /><label class="form-check-label" for="showArchetypeCoreIdentity">Kernidentität</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypePerception" checked /><label class="form-check-label" for="showArchetypePerception">Wahrnehmung</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeLifePlot" checked /><label class="form-check-label" for="showArchetypeLifePlot">Lebensmuster</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeFulfillingActivities" checked /><label class="form-check-label" for="showArchetypeFulfillingActivities">Tätigkeiten</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeHappinessSource" checked /><label class="form-check-label" for="showArchetypeHappinessSource">Glücksquellen</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeLeadershipStyle" checked /><label class="form-check-label" for="showArchetypeLeadershipStyle">Führungsstil</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeHowOthersSeeThem" checked /><label class="form-check-label" for="showArchetypeHowOthersSeeThem">Fremdwahrnehmung</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeShadowTendencies" checked /><label class="form-check-label" for="showArchetypeShadowTendencies">Schattenseiten</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeUnderlyingFear" checked /><label class="form-check-label" for="showArchetypeUnderlyingFear">Tiefe Ängste</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showArchetypeGrowthAreas" checked /><label class="form-check-label" for="showArchetypeGrowthAreas">Wachstumsfelder</label></div>
					</fieldset>
				</div>

				<!-- HEXACO-Anzeigeoptionen -->
				<div class="col-12 col-md-4">
					<fieldset class="form-group">
						<legend class="form-label">HEXACO</legend>
						<!-- <div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showDegrees" checked /><label class="form-check-label" for="showDegrees">Steigerungspartikel</label></div> -->
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showAdjectives" checked /><label class="form-check-label" for="showAdjectives">Adjektive</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showDescriptions" checked /><label class="form-check-label" for="showDescriptions">Beschreibungen</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showItems" checked /><label class="form-check-label" for="showItems">Items</label></div>
					</fieldset>
				</div>

				<!-- Werte-Anzeigeoptionen -->
				<div class="col-12 col-md-4">
					<fieldset class="form-group">
						<legend class="form-label">Schwartz-Werte (klassisch)</legend>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showStrongPositive" checked /><label class="form-check-label" for="showStrongPositive">Extrem wichtige Werte</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showModeratePositive" checked /><label class="form-check-label" for="showModeratePositive">Sehr wichtige Werte</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showNeutral" /><label class="form-check-label" for="showNeutral">Mittelmäßig wichtige Werte</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showModerateNegative" /><label class="form-check-label" for="showModerateNegative">Wenig wichtige Werte</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showStrongNegative" /><label class="form-check-label" for="showStrongNegative">Überhaupt nicht wichtige Werte</label></div>

						<legend class="form-label" style="margin-top:1rem;">Werte-Analyse</legend>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showWertArchetyp" checked /><label class="form-check-label" for="showWertArchetyp">Werte-Archetyp</label></div>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showWertKombination" checked /><label class="form-check-label" for="showWertKombination">Werte-Kombination</label></div>

						<!-- <legend class="form-label" style="margin-top:1rem;">Probabilistisches Profil <span style="font-size:.75em;opacity:.6;">(neu)</span></legend>
						<div class="form-check"><input class="form-check-input display-option" type="checkbox" id="showHybridProfil" checked /><label class="form-check-label" for="showHybridProfil">Markov-Hybrid-Profil</label></div> -->
					</fieldset>
				</div>

			</div>

			<div class="mt-6">
				<button id="btn-generate-personality" class="btn btn-primary">Generieren</button>
			</div>
		</section>

		<!-- Ausgabe -->
		<section class="section">
			<h2>Persönlichkeitsmerkmale</h2>
			<div id="output"></div>
		</section>
	</div>

	<!-- ═══════════════════════════════════════════════════════════
	     SCRIPTS — Ladereihenfolge ist bewusst gewählt:
	     1. Daten & reine Datenkonstanten
	     2. Markov-Sampler (Circumplex-Logik)
	     3. HEXACO-Korrelationstabelle
	     4. Integrations-Bridge
	     5. UI & Rendering
	     ═══════════════════════════════════════════════════════════ -->

	<!-- Stammdaten -->
	<script src="scripts/archetypeArray.js"></script>
	<script src="scripts/facetArray.js"></script>

	<!-- Markov-Sampler: Schwartz-Zirkel-Daten und Kompatibilitätsmatrix -->
	<script src="scripts/data.js"></script>        <!-- VALUES, HOG, VALUES_ANGLE, BIPOLAR ... -->
	<script src="scripts/angDist.js"></script>     <!-- angDist() -->
	<script src="scripts/compat.js"></script>      <!-- compat(), CMAT -->
	<script src="scripts/diversityBonus.js"></script>   <!-- diversityBonus() -->
	<script src="scripts/softmaxWeights.js"></script>   <!-- softmaxWeights() -->
	<script src="scripts/conditionalProbs.js"></script> <!-- conditionalProbs() -->
	<script src="scripts/coherenceScore.js"></script>   <!-- coherenceScore() -->

	<!-- Persönlichkeitsgenerator: Archetyp- & HEXACO-Logik -->
	<script src="scripts/chooseArchetype.js"></script>
	<script src="scripts/setDomainLevel.js"></script>
	<script src="scripts/getArchetypeInfo.js"></script>
	<script src="scripts/setFacetLevel.js"></script>
	<script src="scripts/getFacetDescription.js"></script>
	<script src="scripts/getFacetAdjective.js"></script>
	<script src="scripts/getFacetItem.js"></script>
	<script src="scripts/getFacetDegree.js"></script>
	<script src="scripts/getMoralValueInfo.js"></script>
	<script src="scripts/valueArchetypesText.js"></script>
	<script src="scripts/valueArchetypes.js"></script>
	<script src="scripts/singleValueText.js"></script>
	<script src="scripts/singleValueCombination.js"></script>

	<!-- Altes Werteprofil-System (z-Scores, wird weiterhin für Stufen-Rendering verwendet) -->
	<script src="scripts/computeValueProfile.js"></script>  <!-- CORRELATION_TABLE, VALUE_KEYS -->

	<!-- NEU: Probabilistisches Werteprofil-System (Markov-Hybrid) -->
	<script src="scripts/valueKeyMap.js"></script>             <!-- CAMEL_TO_DE Mapping -->
	<script src="scripts/generatePriorFromHexaco.js"></script> <!-- generatePriorFromHexaco() -->
	<script src="scripts/computeScores.js"></script>           <!-- computeScores(), coherenceCheck -->
	<script src="scripts/hybridSampler.js"></script>           <!-- generateValueProfile() -->

	<!-- Haupt-Controller -->
	<script src="scripts/main.js"></script>

</body>
</html>
